<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>Debug</title></head>
<body>
<h1>Debug 題庫載入</h1>
<button onclick="testFetch()">1. 測試 Fetch API</button>
<button onclick="testScriptTag()">2. 測試 Script 標籤載入</button>
<button onclick="testInline()">3. 測試內嵌 JSON (跳過載入)</button>
<div id="log" style="background:#f5f5f5;padding:10px;font-family:monospace;font-size:13px;white-space:pre-wrap"></div>

<script>
const LOG = document.getElementById('log');
function log(msg) { LOG.textContent += msg + '\n'; console.log(msg); }

// Test 1: Use fetch to get the file
async function testFetch() {
  LOG.textContent = '';
  log('=== Test 1: Fetch API ===');
  try {
    const res = await fetch('js/questions_chinese.js');
    log('Status: ' + res.status);
    log('Content-Type: ' + res.headers.get('content-type'));
    const text = await res.text();
    log('Downloaded: ' + text.length + ' chars');
    log('First 100 chars: ' + text.substring(0, 100));

    // Try to extract and run the JS
    const m = text.match(/const QUESTIONS_國文 = (\[.*\]);/s);
    if (m) {
      log('JSON extracted: ' + m[1].length + ' chars');
      const data = JSON.parse(m[1]);
      log('Parsed: ' + data.length + ' questions');
      log('Q1: ' + data[0].question.substring(0, 60));
      log('✅ Fetch 方法成功！');
    } else {
      log('❌ 無法從檔案中提取 JSON');
    }
  } catch(e) {
    log('❌ 錯誤: ' + e.message);
    log('Stack: ' + e.stack);
  }
}

// Test 2: Dynamic script tag
function testScriptTag() {
  LOG.textContent = '';
  log('=== Test 2: Script 標籤載入 ===');
  log('建立 script 標籤...');

  const script = document.createElement('script');
  script.src = 'js/questions_chinese.js';

  script.onload = function() {
    log('✅ onload 觸發');
    const data = window['QUESTIONS_國文'];
    if (data) {
      log('QUESTIONS_國文 存在: ' + data.length + ' 題');
      log('Q1: ' + data[0].question.substring(0, 60));
    } else {
      log('❌ QUESTIONS_國文 不存在！');
      log('window keys: ' + Object.keys(window).filter(k => k.includes('QUESTION')).join(', '));
    }
  };

  script.onerror = function(e) {
    log('❌ onerror 觸發: ' + JSON.stringify(e));
  };

  document.head.appendChild(script);
  log('Script 標籤已加入 head，等待載入...');
}

// Test 3: Inline JSON with eval
function testInline() {
  LOG.textContent = '';
  log('=== Test 3: 使用 fetch + eval ===');
  fetch('js/questions_chinese.js')
    .then(r => r.text())
    .then(text => {
      log('下載完成: ' + text.length + ' chars');
      try {
        eval(text);
        const data = window['QUESTIONS_國文'];
        if (data) {
          log('✅ eval 成功！' + data.length + ' 題');
          log('Q1: ' + data[0].question.substring(0, 60));
        } else {
          log('❌ eval 後變數不存在');
        }
      } catch(e) {
        log('❌ eval 錯誤: ' + e.message);
      }
    })
    .catch(e => log('❌ Fetch 錯誤: ' + e.message));
}

// Catch all errors
window.onerror = function(msg, src, line, col, err) {
  log('🚨 全域錯誤: ' + msg + ' at ' + src + ':' + line);
  return false;
};
</script>
</body>
</html>
