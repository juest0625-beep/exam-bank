<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國中會考英文單字練習 — 2000 字完整收錄</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #f5f0eb; color: #2c2416; line-height: 1.7;
  min-height: 100vh;
}
.container { max-width: 860px; margin: 0 auto; padding: 16px; }

/* ── Header ── */
header {
  background: linear-gradient(135deg, #1a5276 0%, #2e86c1 50%, #154360 100%);
  color: #f5f0eb; padding: 24px 16px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

/* ── Mode Switch Cards ── */
.modes { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
.mode-card {
  background: #fff; border-radius: 12px; padding: 20px 12px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  border: 2px solid transparent; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.mode-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.mode-card.active { border-color: #2e86c1; background: #eaf2f8; }
.mode-card .emoji { font-size: 2rem; display: block; margin-bottom: 6px; }
.mode-card .name { font-size: 1rem; font-weight: 600; }
.mode-card .desc { font-size: 0.75rem; color: #888; margin-top: 2px; }

/* ── Filters ── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; align-items: center; }
.filters button {
  padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc;
  font-size: 0.9rem; background: #fff; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.filters button.active { background: #2e86c1; color: #fff; border-color: #2e86c1; }
.filters button:hover:not(.active) { border-color: #2e86c1; }
.filters .filter-label { font-size: 0.85rem; color: #888; margin-right: 4px; }

/* ── Flashcard ── */
.flashcard-area { text-align: center; }
.card-stage {
  perspective: 1000px;
  max-width: 420px; min-height: 280px;
  margin: 0 auto 16px; cursor: pointer;
  position: relative;
}
.card-inner {
  position: relative; width: 100%; height: 100%; min-height: 280px;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 12px;
  background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px;
}
.card-back { transform: rotateY(180deg); }

.word-en {
  font-size: 2.4rem; font-weight: 700; letter-spacing: 0.5px;
  text-align: center; word-break: break-word; color: #1a5276;
}
.word-zh {
  font-size: 1.7rem; font-weight: 600; text-align: center; color: #2e86c1;
}
.word-pos { font-size: 0.85rem; color: #888; margin-top: 8px; }
.word-hint { font-size: 0.8rem; color: #aaa; margin-top: 16px; }
.word-level {
  font-size: 0.75rem; padding: 4px 10px; border-radius: 12px;
  margin-top: 12px; font-weight: 600;
}
.word-level.basic1200 { background: #eaf2f8; color: #2e86c1; }
.word-level.common800 { background: #fef9e7; color: #b7950b; }

/* Card action buttons */
.card-actions {
  position: absolute; display: flex; gap: 8px; z-index: 3;
}
.star-btn {
  position: absolute; top: 14px; right: 14px; z-index: 3;
  background: none; border: none; font-size: 1.6rem; cursor: pointer;
  color: #ccc; transition: color 0.2s, transform 0.15s; line-height: 1;
}
.star-btn.bookmarked { color: #f1c40f; }
.star-btn:active { transform: scale(1.25); }
.pronounce-btn {
  position: absolute; bottom: 16px; right: 16px; z-index: 3;
  width: 48px; height: 48px; border-radius: 50%;
  border: 2px solid #2e86c1; background: #fff;
  font-size: 1.3rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.pronounce-btn:active { background: #2e86c1; transform: scale(0.93); }
.pronounce-btn:active::after { color: #fff; }

/* Nav */
.nav-row {
  display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 12px;
}
.progress-text { font-size: 0.9rem; color: #888; min-width: 90px; text-align: center; }

/* ── Progress Bar ── */
.progress-bar {
  width: 100%; max-width: 420px; height: 6px; background: #e0d5c5;
  border-radius: 3px; margin: 0 auto 8px;
}
.progress-bar .fill {
  height: 100%; background: #2e86c1; border-radius: 3px; transition: width 0.3s;
}

/* ── Quiz ── */
.quiz-area { }
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin: 0 auto 16px; max-width: 420px; font-size: 0.9rem; color: #888;
}
.quiz-word-card {
  max-width: 420px; margin: 0 auto 16px;
  background: #fff; border-radius: 12px; padding: 32px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center;
  position: relative;
}
.quiz-options {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  max-width: 420px; margin: 0 auto;
}
.quiz-option {
  padding: 14px; border: 2px solid #e0d5c5; border-radius: 10px;
  background: #fff; font-size: 0.95rem; cursor: pointer; text-align: center;
  font-family: inherit; transition: all 0.15s; word-break: break-word;
  min-height: 50px; display: flex; align-items: center; justify-content: center;
}
.quiz-option:hover { border-color: #2e86c1; background: #eaf2f8; }
.quiz-option:active { transform: scale(0.97); }
.quiz-option.correct { border-color: #27ae60; background: #e8f8f0; color: #1a7a3a; }
.quiz-option.incorrect { border-color: #c0392b; background: #fdedec; color: #a82020; }
.quiz-option:disabled { pointer-events: none; opacity: 0.85; }

/* Quiz setup */
.quiz-setup { text-align: center; max-width: 420px; margin: 0 auto; }
.quiz-setup p { color: #888; margin-bottom: 12px; }
.length-options { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0; }

/* ── Buttons ── */
.btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 10px 24px; border-radius: 8px; border: none; font-size: 0.95rem;
  cursor: pointer; font-weight: 600; transition: all 0.15s; font-family: inherit;
  min-height: 44px;
}
.btn-primary { background: #2e86c1; color: #fff; }
.btn-primary:hover { background: #1a5276; }
.btn-secondary { background: #fff; color: #2e86c1; border: 1px solid #2e86c1; }
.btn-secondary:hover { background: #eaf2f8; }
.btn-success { background: #27ae60; color: #fff; }
.btn-success:hover { background: #1e8449; }
.btn-icon {
  width: 44px; height: 44px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}

/* ── Results ── */
.score-card {
  background: #fff; border-radius: 12px; padding: 32px 24px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 20px auto; max-width: 420px;
}
.score-big { font-size: 3rem; font-weight: 700; color: #2e86c1; }
.score-label { font-size: 0.9rem; color: #888; margin-bottom: 8px; }
.score-stats { font-size: 0.95rem; color: #555; margin-top: 8px; }

.review-list { max-width: 420px; margin: 16px auto; }
.review-item {
  padding: 10px 14px; margin: 6px 0; border-radius: 8px; font-size: 0.9rem;
  display: flex; justify-content: space-between; align-items: center;
}
.review-item.wrong { background: #fdedec; border-left: 3px solid #c0392b; }
.review-item .review-pronounce {
  background: none; border: 1px solid #ccc; border-radius: 6px;
  padding: 4px 10px; cursor: pointer; font-size: 0.85rem;
}

/* ── History Section ── */
.history-section {
  margin: 20px auto; padding: 16px; background: #fff; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); max-width: 420px;
}
.history-section h3 { font-size: 1rem; color: #2e86c1; margin-bottom: 10px; }
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #f0e6d8; font-size: 0.85rem;
}
.history-item:last-child { border-bottom: none; }
.hi-score { font-weight: 600; }
.hi-score.good { color: #27ae60; }
.hi-score.ok { color: #e67e22; }
.hi-score.bad { color: #c0392b; }

/* ── Dark Mode Toggle ── */
.theme-toggle {
  position: fixed; bottom: 20px; right: 20px; z-index: 10;
  width: 44px; height: 44px; border-radius: 50%;
  background: #fff; border: 1px solid #ccc; font-size: 1.2rem;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
}

/* ── States ── */
.loading, .empty-state {
  text-align: center; color: #888; padding: 60px 20px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid #e0d5c5;
  border-top-color: #2e86c1; border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Responsive ── */
@media (max-width: 500px) {
  header h1 { font-size: 1.2rem; }
  header p { font-size: 0.75rem; }
  .modes { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .mode-card { padding: 14px 8px; }
  .mode-card .emoji { font-size: 1.5rem; }
  .word-en { font-size: 1.8rem; }
  .word-zh { font-size: 1.3rem; }
  .card-face { padding: 24px 16px; }
  .quiz-options { grid-template-columns: 1fr; }
  .filters { flex-wrap: wrap; }
}

/* ── Dark Mode ── */
body.dark { background: #1a1410; color: #e8d5c0; }
body.dark header { background: linear-gradient(135deg, #0d3548 0%, #1a5276 50%, #0a2a3a 100%); }
body.dark .mode-card,
body.dark .card-face,
body.dark .quiz-word-card,
body.dark .quiz-option,
body.dark .score-card,
body.dark .history-section,
body.dark .theme-toggle { background: #2a2218; border-color: #3d3222; }
body.dark .mode-card .desc { color: #999; }
body.dark .mode-card.active { background: #1a3040; border-color: #2e86c1; }
body.dark .quiz-option { border-color: #3d3222; }
body.dark .quiz-option:hover { border-color: #2e86c1; background: #253545; }
body.dark .quiz-option.correct { background: #1a3020; border-color: #27ae60; color: #5aad68; }
body.dark .quiz-option.incorrect { background: #301a1a; border-color: #c0392b; color: #d45a5a; }
body.dark .review-item.wrong { background: #301a1a; }
body.dark .progress-bar { background: #3d3222; }
body.dark .history-item { border-color: #3d3222; }
body.dark .word-en { color: #5dade2; }
body.dark .word-zh { color: #85c1e9; }
body.dark .word-level.basic1200 { background: #1a3040; color: #5dade2; }
body.dark .word-level.common800 { background: #302a10; color: #d4ac0d; }
body.dark .btn-secondary { background: #2a2218; }
body.dark .filters button { background: #2a2218; color: #e8d5c0; border-color: #3d3222; }
body.dark .filters button.active { background: #2e86c1; color: #fff; }
</style>
</head>
<body>

<header>
  <h1>🔤 國中會考英文單字</h1>
  <p>基本 1200 ＋ 常用 800 字完整收錄 · 閃卡記憶 · 發音練習 · 測驗挑戰</p>
</header>

<div class="container">

  <!-- Mode Selection -->
  <div class="modes" id="modes">
    <div class="mode-card" data-mode="flashcard" onclick="switchMode('flashcard')">
      <span class="emoji">📇</span><span class="name">閃卡模式</span>
      <span class="desc">翻卡背單字</span>
    </div>
    <div class="mode-card" data-mode="quiz-setup" onclick="switchMode('quiz-setup')">
      <span class="emoji">📝</span><span class="name">測驗模式</span>
      <span class="desc">選擇題挑戰</span>
    </div>
    <div class="mode-card" data-mode="bookmarked" onclick="switchMode('bookmarked')">
      <span class="emoji">⭐</span><span class="name">書籤複習</span>
      <span class="desc" id="bookmarkCount">0 字</span>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span class="filter-label">篩選：</span>
    <button data-filter="all" class="active" onclick="setFilter('all')">全部 (<span id="countAll">0</span>)</button>
    <button data-filter="basic1200" onclick="setFilter('basic1200')">基本 1200 (<span id="countBasic">0</span>)</button>
    <button data-filter="common800" onclick="setFilter('common800')">常用 800 (<span id="countCommon">0</span>)</button>
    <button data-filter="bookmarked" onclick="setFilter('bookmarked')">⭐ 書籤 (<span id="countBookmarked">0</span>)</button>
  </div>

  <!-- Main Content Area -->
  <div id="mainContent"></div>

  <!-- Practice History -->
  <div class="history-section" id="historySection" style="display:none"></div>

</div>

<!-- Dark Mode Toggle -->
<button class="theme-toggle" id="themeToggle" title="切換深色模式" onclick="toggleTheme()">🌙</button>

<noscript><p style="text-align:center;padding:40px;color:#c0392b">⚠ 此頁面需要 JavaScript 才能運作。</p></noscript>

<script>
// ── State ──
const state = {
  words: [],
  filteredWords: [],
  mode: 'flashcard',
  filter: 'all',
  currentIndex: 0,
  bookmarks: new Set(),
  darkMode: false,

  quizWords: [],
  quizCurrent: 0,
  quizCorrect: 0,
  quizMissed: [],
};

const POS_LABELS = {
  noun:'名詞', verb:'動詞', adjective:'形容詞', adverb:'副詞', pronoun:'代名詞',
  preposition:'介系詞', conjunction:'連接詞', interjection:'感嘆詞', article:'冠詞',
  auxiliary:'助動詞', determiner:'限定詞', phrase:'片語', contraction:'縮短形',
  prefix:'字首', suffix:'字尾'
};

// ── Persistence ──
function loadState() {
  try {
    const bm = localStorage.getItem('vocab_bookmarks');
    if (bm) state.bookmarks = new Set(JSON.parse(bm));
    state.darkMode = localStorage.getItem('vocab_dark_mode') === 'true';
    const m = localStorage.getItem('vocab_last_mode');
    if (m && ['flashcard','quiz-setup','bookmarked'].includes(m)) state.mode = m;
    const f = localStorage.getItem('vocab_last_filter');
    if (f) state.filter = f;
    state.currentIndex = parseInt(localStorage.getItem('vocab_last_index')) || 0;
  } catch(e) {}
}
function save() {
  localStorage.setItem('vocab_bookmarks', JSON.stringify([...state.bookmarks]));
  localStorage.setItem('vocab_dark_mode', state.darkMode);
  localStorage.setItem('vocab_last_mode', state.mode);
  localStorage.setItem('vocab_last_filter', state.filter);
  localStorage.setItem('vocab_last_index', state.currentIndex);
}

// ── Data ──
function applyFilter() {
  let list = state.words;
  if (state.filter === 'basic1200') list = list.filter(w => w.level === 'basic1200');
  if (state.filter === 'common800') list = list.filter(w => w.level === 'common800');
  if (state.filter === 'bookmarked') list = list.filter(w => state.bookmarks.has(w.id));
  state.filteredWords = list;
  if (state.currentIndex >= list.length) state.currentIndex = Math.max(0, list.length - 1);
}

async function loadWords() {
  document.getElementById('mainContent').innerHTML = '<div class="loading"><div class="spinner"></div><p>載入單字中…</p></div>';
  try {
    const resp = await fetch('words.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    state.words = await resp.json();
    updateCounts();
    applyFilter();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div class="empty-state"><p style="font-size:2rem;margin-bottom:12px">😢</p>
      <p>無法載入單字資料</p>
      <p style="font-size:0.85rem;margin-top:8px">請確認 words.json 和 index.html 在同一個資料夾</p>
      <button class="btn btn-primary" onclick="location.reload()" style="margin-top:16px">重新載入</button></div>`;
  }
}

function updateCounts() {
  document.getElementById('countAll').textContent = state.words.length;
  document.getElementById('countBasic').textContent = state.words.filter(w => w.level === 'basic1200').length;
  document.getElementById('countCommon').textContent = state.words.filter(w => w.level === 'common800').length;
  document.getElementById('countBookmarked').textContent = state.bookmarks.size;
  document.getElementById('bookmarkCount').textContent = state.bookmarks.size + ' 字';
}

// ── Pronunciation ──
function speak(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const pref = voices.find(v => v.lang.startsWith('en') && v.name.includes('US')) ||
               voices.find(v => v.lang.startsWith('en'));
  if (pref) u.voice = pref;
  window.speechSynthesis.speak(u);
}
function initVoices() { if (window.speechSynthesis) window.speechSynthesis.getVoices(); }

// ── Render ──
function render() {
  applyFilter();
  updateCounts();
  updateModeCards();
  updateFilterButtons();

  if (state.mode === 'flashcard' || state.mode === 'bookmarked') renderFlashcard();
  else if (state.mode === 'quiz-setup') renderQuizSetup();
  else if (state.mode === 'quiz') renderQuiz();
  else if (state.mode === 'quiz-result') renderQuizResult();

  renderHistory();
  save();
}

function updateModeCards() {
  document.querySelectorAll('.mode-card').forEach(c => {
    c.classList.toggle('active', c.dataset.mode === state.mode ||
      (c.dataset.mode === 'bookmarked' && state.mode === 'bookmarked'));
  });
}
function updateFilterButtons() {
  document.querySelectorAll('#filters button').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === state.filter);
  });
}

// ── Flashcard ──
function renderFlashcard() {
  const el = document.getElementById('mainContent');
  const words = state.filteredWords;

  if (words.length === 0) {
    el.innerHTML = `<div class="empty-state"><p style="font-size:2rem">📭</p>
      <p>${state.filter === 'bookmarked' ? '還沒有書籤喔～在閃卡模式點 ⭐ 收藏單字吧' : '沒有符合條件的單字'}</p></div>`;
    return;
  }

  const idx = Math.min(state.currentIndex, words.length - 1);
  const w = words[idx];
  const posStr = w.pos.length ? w.pos.map(p => POS_LABELS[p] || p).join(' · ') : '';
  const levelLabel = w.level === 'basic1200' ? '基本 1200' : '常用 800';
  const isBm = state.bookmarks.has(w.id);

  el.innerHTML = `
    <div class="flashcard-area">
      <div class="progress-bar"><div class="fill" style="width:${(idx+1)/words.length*100}%"></div></div>
      <div class="card-stage" id="cardStage">
        <div class="card-inner" id="cardInner">
          <div class="card-face card-front">
            <button class="star-btn ${isBm?'bookmarked':''}" id="starFront">${isBm?'★':'☆'}</button>
            <div class="word-en">${w.en}</div>
            ${posStr ? `<div class="word-pos">${posStr}</div>` : ''}
            <div class="word-level ${w.level}">${levelLabel}</div>
            <div class="word-hint">點擊卡片看答案</div>
            <button class="pronounce-btn" id="pronFront">🔊</button>
          </div>
          <div class="card-face card-back">
            <button class="star-btn ${isBm?'bookmarked':''}" id="starBack">${isBm?'★':'☆'}</button>
            <div class="word-en" style="font-size:1.2rem;color:#888;margin-bottom:4px">${w.en}</div>
            <div class="word-zh">${w.zh}</div>
            ${posStr ? `<div class="word-pos">${posStr}</div>` : ''}
            <div class="word-level ${w.level}">${levelLabel}</div>
            <button class="pronounce-btn" id="pronBack">🔊</button>
          </div>
        </div>
      </div>
      <div class="nav-row">
        <button class="btn btn-secondary btn-icon" id="btnPrev">◀</button>
        <span class="progress-text">${idx + 1} / ${words.length}</span>
        <button class="btn btn-secondary btn-icon" id="btnNext">▶</button>
      </div>
    </div>`;

  document.getElementById('cardStage').addEventListener('click', (e) => {
    if (e.target.closest('.star-btn') || e.target.closest('.pronounce-btn')) return;
    document.getElementById('cardInner').classList.toggle('flipped');
  });
  document.getElementById('btnPrev').addEventListener('click', () => {
    state.currentIndex = idx > 0 ? idx - 1 : words.length - 1;
    render();
  });
  document.getElementById('btnNext').addEventListener('click', () => {
    state.currentIndex = idx < words.length - 1 ? idx + 1 : 0;
    render();
  });
  document.getElementById('starFront').addEventListener('click', (e) => { e.stopPropagation(); toggleBookmark(w.id); });
  document.getElementById('starBack').addEventListener('click', (e) => { e.stopPropagation(); toggleBookmark(w.id); });
  document.getElementById('pronFront').addEventListener('click', (e) => { e.stopPropagation(); speak(w.en); });
  document.getElementById('pronBack').addEventListener('click', (e) => { e.stopPropagation(); speak(w.en); });

  document.removeEventListener('keydown', handleKey);
  document.addEventListener('keydown', handleKey);
  initVoices();
}

function handleKey(e) {
  if (state.mode !== 'flashcard' && state.mode !== 'bookmarked') return;
  const words = state.filteredWords;
  if (e.key === 'ArrowLeft') { state.currentIndex = state.currentIndex > 0 ? state.currentIndex - 1 : words.length - 1; render(); }
  else if (e.key === 'ArrowRight') { state.currentIndex = state.currentIndex < words.length - 1 ? state.currentIndex + 1 : 0; render(); }
  else if (e.key === ' ' || e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const card = document.getElementById('cardInner');
    if (card) card.classList.toggle('flipped');
  }
}

function toggleBookmark(wordId) {
  if (state.bookmarks.has(wordId)) state.bookmarks.delete(wordId);
  else state.bookmarks.add(wordId);
  save();
  render();
}

// ── Quiz ──
function shuffle(arr) { const a = [...arr]; for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function renderQuizSetup() {
  const total = state.filteredWords.length;
  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="quiz-setup">
      <h2 style="margin-bottom:8px">📝 測驗模式</h2>
      <p>目前範圍：${state.filter==='all'?'全部':state.filter==='basic1200'?'基本1200':state.filter==='common800'?'常用800':'書籤'}（${total} 字）</p>
      <p>選擇題數：</p>
      <div class="length-options">
        <button class="btn btn-secondary" data-len="10">10 題</button>
        <button class="btn btn-secondary" data-len="20">20 題</button>
        <button class="btn btn-secondary" data-len="50">50 題</button>
        <button class="btn btn-secondary" data-len="${total}">全部 (${total})</button>
      </div>
      <button class="btn btn-primary" onclick="switchMode('flashcard')" style="margin-top:16px">← 回閃卡模式</button>
    </div>`;
  document.querySelectorAll('[data-len]').forEach(b => {
    b.addEventListener('click', () => startQuiz(parseInt(b.dataset.len)));
  });
}

function startQuiz(len) {
  state.quizWords = shuffle([...state.filteredWords]).slice(0, Math.min(len, state.filteredWords.length));
  state.quizCurrent = 0; state.quizCorrect = 0; state.quizMissed = [];
  state.mode = 'quiz';
  render();
}

function renderQuiz() {
  const el = document.getElementById('mainContent');
  const q = state.quizWords[state.quizCurrent];
  if (!q) { showQuizResult(); return; }

  const pool = state.words.filter(w => w.id !== q.id && w.level === q.level);
  const distractors = shuffle(pool).slice(0, 3);
  const options = shuffle([q, ...distractors]);

  el.innerHTML = `
    <div class="quiz-area">
      <div class="progress-bar"><div class="fill" style="width:${(state.quizCurrent)/state.quizWords.length*100}%"></div></div>
      <div class="quiz-header">
        <span>第 ${state.quizCurrent+1} / ${state.quizWords.length} 題</span>
        <span>✅ ${state.quizCorrect} 題正確</span>
      </div>
      <div class="quiz-word-card">
        <div class="word-en">${q.en}</div>
        <button class="pronounce-btn" id="quizPron">🔊</button>
      </div>
      <div class="quiz-options" id="quizOpts"></div>
    </div>`;

  document.getElementById('quizPron').addEventListener('click', () => speak(q.en));
  initVoices();

  const container = document.getElementById('quizOpts');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt.zh;
    btn.addEventListener('click', () => handleAnswer(opt, q, container));
    container.appendChild(btn);
  });
}

function handleAnswer(selected, correct, container) {
  const isCorrect = selected.id === correct.id;
  container.querySelectorAll('.quiz-option').forEach(b => {
    b.disabled = true;
    if (b.textContent === correct.zh) b.classList.add('correct');
    if (b.textContent === selected.zh && !isCorrect) b.classList.add('incorrect');
  });
  if (isCorrect) state.quizCorrect++; else state.quizMissed.push(correct);
  setTimeout(() => speak(correct.en), 200);
  setTimeout(() => {
    state.quizCurrent++;
    state.quizCurrent >= state.quizWords.length ? showQuizResult() : render();
  }, 1400);
}

function showQuizResult() {
  state.mode = 'quiz-result';
  const total = state.quizWords.length;
  const correct = state.quizCorrect;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : pct >= 50 ? '📚' : '💪';

  const el = document.getElementById('mainContent');
  el.innerHTML = `
    <div class="score-card">
      <div class="score-label">測驗結束</div>
      <div class="score-big">${emoji} ${pct} 分</div>
      <div class="score-stats">答對 ${correct} / ${total} 題</div>
    </div>
    ${state.quizMissed.length > 0 ? `
      <div class="review-list">
        <h3 style="margin-bottom:8px;font-size:1rem">📋 錯題複習（${state.quizMissed.length} 題）</h3>
        ${state.quizMissed.map(w => `
          <div class="review-item wrong">
            <span><strong>${w.en}</strong> — ${w.zh}</span>
            <button class="review-pronounce" data-word="${w.en.replace(/"/g,'&quot;')}" onclick="speak(this.dataset.word)">🔊</button>
          </div>
        `).join('')}
      </div>
    ` : '<p style="text-align:center;color:#27ae60;margin:16px">🎉 全部答對！完美！</p>'}
    <div class="btn-row">
      <button class="btn btn-primary" onclick="switchMode('quiz-setup')">🔄 再測一次</button>
      <button class="btn btn-secondary" onclick="switchMode('flashcard')">📇 回閃卡模式</button>
    </div>`;

  saveQuizHistory(pct, correct, total);
}

function saveQuizHistory(pct, correct, total) {
  try {
    const history = JSON.parse(localStorage.getItem('vocab_quiz_history') || '[]');
    history.push({ date: new Date().toISOString(), pct, correct, total, filter: state.filter });
    if (history.length > 20) history.shift();
    localStorage.setItem('vocab_quiz_history', JSON.stringify(history));
  } catch(e) {}
}

// ── History ──
function renderHistory() {
  try {
    const history = JSON.parse(localStorage.getItem('vocab_quiz_history') || '[]');
    const recent = history.slice(-5).reverse();
    const section = document.getElementById('historySection');
    if (recent.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    section.innerHTML = '<h3>📊 練習紀錄（最近 5 次）</h3>' + recent.map(h => {
      const d = new Date(h.date);
      const ds = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const cls = h.pct >= 80 ? 'good' : h.pct >= 50 ? 'ok' : 'bad';
      const filterLabel = h.filter === 'all' ? '全部' : h.filter === 'basic1200' ? '基本1200' : h.filter === 'common800' ? '常用800' : '書籤';
      return `<div class="history-item">
        <span>${ds} · ${filterLabel} · ${h.correct}/${h.total} 題</span>
        <span class="hi-score ${cls}">${h.pct}分</span>
      </div>`;
    }).join('');
  } catch(e) { document.getElementById('historySection').style.display = 'none'; }
}

// ── Mode & Filter Switches ──
function switchMode(mode) {
  if (mode === 'bookmarked') {
    state.filter = 'bookmarked';
    state.mode = 'flashcard';
  } else if (mode === 'quiz-setup' && state.filteredWords.length < 4) {
    alert('目前範圍單字不足 4 個，請切換篩選範圍。');
    return;
  } else {
    state.mode = mode;
  }
  state.currentIndex = 0;
  render();
}

function setFilter(filter) {
  state.filter = filter;
  state.currentIndex = 0;
  if (state.mode === 'quiz' || state.mode === 'quiz-result') state.mode = 'flashcard';
  render();
}

// ── Theme ──
function toggleTheme() {
  state.darkMode = !state.darkMode;
  applyTheme();
  save();
}
function applyTheme() {
  if (state.darkMode) {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
  document.getElementById('themeToggle').textContent = state.darkMode ? '☀️' : '🌙';
}

// ── Init ──
function init() {
  loadState();
  // If no saved preference, use system preference
  if (localStorage.getItem('vocab_dark_mode') === null) {
    state.darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
  }
  applyTheme();
  loadWords();
}
init();
</script>
