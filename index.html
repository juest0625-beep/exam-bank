<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 國中會考題庫 — 全台灣最完整</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #f5f0eb; color: #2c2416; line-height: 1.7;
  min-height: 100vh;
}
.container { max-width: 860px; margin: 0 auto; padding: 16px; }

/* ── Header ── */
header {
  background: linear-gradient(135deg, #8b4513 0%, #a0522d 50%, #6b3410 100%);
  color: #f5f0eb; padding: 24px 16px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 2px; }
header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

/* ── Subject Cards ── */
.subjects { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin: 20px 0; }
.card {
  background: #fff; border-radius: 12px; padding: 20px 12px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  border: 2px solid transparent; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card:hover:not(.disabled) { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.card.active { border-color: #8b4513; background: #fdf6f0; }
.card.disabled { opacity: 0.4; cursor: not-allowed; background: #e8e3dc; }
.card .emoji { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.card .name { font-size: 1rem; font-weight: 600; }
.card .count { font-size: 0.75rem; color: #888; margin-top: 2px; }
.card .coming-soon { font-size: 0.7rem; color: #c62828; font-style: italic; }

/* ── Filters ── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; align-items: center; }
.filters select, .filters button {
  padding: 8px 14px; border-radius: 8px; border: 1px solid #ccc;
  font-size: 0.9rem; background: #fff; cursor: pointer;
}
.filters button { background: #8b4513; color: #fff; border: none; font-weight: 600; }
.filters button:hover { background: #6b3410; }
.filters button.secondary { background: #fff; color: #8b4513; border: 1px solid #8b4513; }
.filters .filter-group { display: flex; gap: 6px; align-items: center; }
.filters label { font-size: 0.85rem; color: #666; white-space: nowrap; }

/* ── Quiz Area ── */
.quiz-area { display: none; }
.quiz-area.show { display: block; }
.progress {
  display: flex; justify-content: space-between; align-items: center;
  margin: 16px 0; font-size: 0.9rem; color: #666;
}
.progress-bar {
  width: 100%; height: 6px; background: #e0d5c5; border-radius: 3px; margin: 8px 0;
}
.progress-bar .fill { height: 100%; background: #8b4513; border-radius: 3px; transition: width 0.3s; }
.question-card {
  background: #fff; border-radius: 12px; padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 16px 0;
  position: relative;
}
.question-card .q-num { font-size: 0.8rem; color: #8b4513; font-weight: 600; margin-bottom: 8px; }
.question-card .q-text { font-size: 1.05rem; margin-bottom: 16px; line-height: 1.8; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  padding: 12px 16px; border: 2px solid #e0d5c5; border-radius: 10px;
  cursor: pointer; transition: all 0.15s; font-size: 0.95rem;
}
.option:hover { border-color: #a0522d; background: #fdf6f0; }
.option.selected { border-color: #8b4513; background: #f0e6d8; }
.option.correct { border-color: #2e7d32; background: #e8f5e9; }
.option.wrong { border-color: #c62828; background: #ffebee; }
.option:disabled { cursor: default; opacity: 0.85; }
.explanation {
  margin-top: 16px; padding: 14px 18px; background: #fdf6f0; border-radius: 8px;
  border-left: 4px solid #8b4513; font-size: 0.9rem; display: none; line-height: 1.8;
}
.explanation.show { display: block; }
.explanation .exp-correct { color: #2e7d32; }
.explanation .exp-wrong { color: #c62828; }
.explanation .exp-kp { color: #1565c0; font-weight: 600; }

/* 🚩 Dispute button */
.dispute-btn {
  position: absolute; bottom: 12px; right: 12px;
  background: transparent; border: 1px solid #ccc; border-radius: 6px;
  padding: 4px 10px; font-size: 0.75rem; cursor: pointer; color: #888;
  transition: all 0.15s;
}
.dispute-btn:hover { background: #ffebee; border-color: #c62828; color: #c62828; }

/* Dispute modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 12px; padding: 24px; max-width: 420px; width: 90%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
}
.modal h3 { margin-bottom: 12px; color: #c62828; }
.modal label { display: block; margin: 10px 0 4px; font-size: 0.85rem; color: #666; }
.modal select, .modal textarea {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc;
  font-size: 0.9rem; font-family: inherit;
}
.modal textarea { min-height: 60px; resize: vertical; }
.modal .btn-row { justify-content: flex-end; }

.btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
.btn {
  padding: 10px 24px; border-radius: 8px; border: none; font-size: 0.95rem;
  cursor: pointer; font-weight: 600; transition: all 0.15s;
}
.btn-primary { background: #8b4513; color: #fff; }
.btn-primary:hover { background: #6b3410; }
.btn-secondary { background: #fff; color: #8b4513; border: 1px solid #8b4513; }
.btn-success { background: #2e7d32; color: #fff; }
.btn-danger { background: #c62828; color: #fff; }

/* ── Weakness hint ── */
.weakness-hint {
  margin: 12px 0; padding: 10px 14px; background: #fff3e0; border-radius: 8px;
  border-left: 4px solid #e65100; font-size: 0.85rem; display: none;
}
.weakness-hint.show { display: block; }

/* ── Results ── */
.results { display: none; }
.results.show { display: block; }
.score-card {
  background: #fff; border-radius: 12px; padding: 32px 24px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin: 20px 0;
}
.score { font-size: 3rem; font-weight: 700; color: #8b4513; }
.score-label { font-size: 0.9rem; color: #888; margin-bottom: 8px; }
.review-list { margin: 16px 0; }
.review-item {
  padding: 10px 14px; margin: 6px 0; border-radius: 8px; font-size: 0.9rem;
}
.review-item.correct { background: #e8f5e9; border-left: 3px solid #2e7d32; }
.review-item.wrong { background: #ffebee; border-left: 3px solid #c62828; }

/* ── History Section ── */
.history-section {
  margin: 20px 0; padding: 16px; background: #fff; border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.history-section h3 { font-size: 1rem; color: #8b4513; margin-bottom: 10px; }
.history-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #f0e6d8; font-size: 0.85rem;
}
.history-item:last-child { border-bottom: none; }
.history-item .hi-score { font-weight: 600; }
.history-item .hi-score.good { color: #2e7d32; }
.history-item .hi-score.ok { color: #e65100; }
.history-item .hi-score.bad { color: #c62828; }

/* ── Responsive ── */
@media (max-width: 500px) {
  header h1 { font-size: 1.2rem; }
  .subjects { grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .card { padding: 14px 8px; }
  .card .emoji { font-size: 1.6rem; }
  .question-card { padding: 16px; }
  .filters { flex-direction: column; align-items: stretch; }
}

/* ── Dark Mode ── */
@media (prefers-color-scheme: dark) {
  body { background: #1a1410; color: #e8d5c0; }
  .card, .question-card, .score-card, .history-section, .modal { background: #2a2218; border-color: #3d3222; }
  .card.disabled { background: #1a1410; }
  .card .count { color: #999; }
  .option { border-color: #3d3222; }
  .option:hover { border-color: #a0522d; background: #352a1c; }
  .option.selected { border-color: #c89460; background: #3d2e1c; }
  .option.correct { border-color: #2e7d32; background: #1a3020; }
  .option.wrong { border-color: #c62828; background: #301a1a; }
  .explanation { background: #2a2218; }
  .weakness-hint { background: #2a1a10; }
  .filters select, .filters button { background: #2a2218; color: #e8d5c0; border-color: #3d3222; }
  .progress-bar { background: #3d3222; }
  .review-item.correct { background: #1a3020; }
  .review-item.wrong { background: #301a1a; }
  .history-item { border-color: #3d3222; }
}
</style>

<script>
// ── State ──
let selectedSubject = null;
let allQuestions = [];        // Currently loaded subject's questions
let quizQuestions = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let userAnswers = [];
let wrongKnowledgePoints = {};
let disputeQuestionId = null;
let loadingSubject = null;    // Subject currently being loaded

// ── Subject definitions ──
const SUBJECT_DEFS = [
  { key: '國文', emoji: '📖', color: '#c62828' },
  { key: '英文', emoji: '🔤', color: '#1565c0' },
  { key: '數學', emoji: '🔢', color: '#2e7d32' },
  { key: '自然', emoji: '🔬', color: '#6a1b9a' },
  { key: '社會', emoji: '🌍', color: '#e65100' },
];

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  if (typeof BANK_INDEX === 'undefined') {
    document.getElementById('subjects').innerHTML = '<p style="text-align:center;padding:40px">⏳ 題庫載入中...</p>';
    setTimeout(checkIndex, 200);
    return;
  }
  renderSubjects();
  renderHistory();
});

function checkIndex() {
  if (typeof BANK_INDEX !== 'undefined') {
    renderSubjects();
    renderHistory();
  } else {
    setTimeout(checkIndex, 500);
  }
}

function renderSubjects() {
  const html = SUBJECT_DEFS.map(s => {
    const info = BANK_INDEX[s.key];
    const count = info ? info.count : 0;
    const isDisabled = count === 0;
    return `
    <div class="card${isDisabled ? ' disabled' : ''}" data-subject="${s.key}"
         onclick="${isDisabled ? '' : `selectSubject('${s.key}')`}"
         title="${isDisabled ? '即將上線' : `${s.key}：${count} 題`}">
      <span class="emoji">${s.emoji}</span>
      <span class="name">${s.key}</span>
      <span class="count">${count} 題</span>
      ${isDisabled ? '<span class="coming-soon">即將上線</span>' : ''}
    </div>
  `}).join('');
  document.getElementById('subjects').innerHTML = html;
}

async function selectSubject(subj) {
  selectedSubject = subj;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`[data-subject="${subj}"]`);
  if (card) card.classList.add('active');

  // Load subject data if not yet loaded
  if (typeof window['QUESTIONS_' + subj] === 'undefined') {
    if (loadingSubject === subj) return; // Already loading
    loadingSubject = subj;
    card.style.opacity = '0.6';
    try {
      await loadScript(`js/questions_${subj}.js`);
    } catch(e) {
      alert(`載入${subj}題庫失敗，請重整頁面再試。`);
      loadingSubject = null;
      return;
    }
    card.style.opacity = '1';
    loadingSubject = null;
  }
  allQuestions = window['QUESTIONS_' + subj] || [];
  populateFilters();
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function populateFilters() {
  const info = selectedSubject ? BANK_INDEX[selectedSubject] : null;

  const sSel = document.getElementById('semesterFilter');
  // Reset to base options
  sSel.innerHTML = `
    <option value="">全部學期</option>
    <option value="七年級上學期">七年級上學期</option>
    <option value="七年級下學期">七年級下學期</option>
    <option value="八年級上學期">八年級上學期</option>
    <option value="八年級下學期">八年級下學期</option>
    <option value="九年級上學期">九年級上學期</option>
    <option value="九年級下學期">九年級下學期</option>
    <option value="歷年會考">📝 歷屆會考</option>`;

  const eSel = document.getElementById('examFilter');
  if (info && info.exams) {
    eSel.innerHTML = '<option value="">所有考試</option>' +
      info.exams.map(e => `<option>${e}</option>`).join('');
  } else {
    eSel.innerHTML = '<option value="">所有考試</option>';
  }
}

// ── Question filtering ──
function getFilteredQuestions() {
  if (!selectedSubject || allQuestions.length === 0) return [];

  let qs = [...allQuestions];
  const semester = document.getElementById('semesterFilter').value;
  if (semester === '歷年會考') {
    qs = qs.filter(q => (q.source || '').includes('會考') || (q.exam || '').includes('會考'));
  } else if (semester) {
    qs = qs.filter(q => (q.semester || '') === semester);
  }

  const exam = document.getElementById('examFilter').value;
  if (exam) qs = qs.filter(q => q.exam === exam);

  qs = qs.filter(q => q.options && q.options.length >= 2);
  return qs;
}

// ── Shuffle ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Quiz Logic ──
async function startQuiz(count) {
  // If no subject selected, load all subjects
  if (!selectedSubject) {
    alert('請先選擇一個科目！');
    return;
  }

  // Ensure data is loaded
  if (typeof window['QUESTIONS_' + selectedSubject] === 'undefined') {
    document.getElementById('quizArea').classList.add('show');
    document.getElementById('questionCard').innerHTML = '<p style="text-align:center;padding:40px">⏳ 載入題庫中...</p>';
    await loadScript(`js/questions_${selectedSubject}.js`);
    allQuestions = window['QUESTIONS_' + selectedSubject] || [];
  }

  const pool = getFilteredQuestions();
  if (pool.length === 0) {
    alert('沒有符合篩選條件的題目，請調整篩選。');
    document.getElementById('quizArea').classList.remove('show');
    return;
  }

  quizQuestions = shuffle(pool).slice(0, count || Math.min(pool.length, 20));
  currentIndex = 0;
  score = 0;
  answered = false;
  userAnswers = new Array(quizQuestions.length).fill(null);
  wrongKnowledgePoints = {};

  document.getElementById('subjects').style.display = 'none';
  document.querySelector('.filters').style.display = 'none';
  document.getElementById('historySection').style.display = 'none';
  document.getElementById('weaknessHint').classList.remove('show');
  document.getElementById('quizArea').classList.add('show');
  document.getElementById('results').classList.remove('show');
  document.getElementById('scoreDisplay').textContent = '';

  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= quizQuestions.length) {
    showResults();
    return;
  }

  const q = quizQuestions[currentIndex];
  answered = false;

  document.getElementById('qCounter').textContent =
    `第 ${currentIndex + 1} / ${quizQuestions.length} 題 | ${q.subject} · ${q.semester || q.grade || ''}`;

  const pct = (currentIndex / quizQuestions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  let html = `<div class="q-num">📝 ${q.subject} · ${q.semester || q.grade || ''} · ${q.exam || ''}</div>`;
  html += `<div class="q-text">${q.question}</div>`;
  html += `<div class="options">`;

  const alpha = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];

  q.options.forEach((opt, i) => {
    html += `<div class="option" data-idx="${i}" onclick="selectOption(${i})">
      ${alpha[i] || i+1}) ${opt.text}
    </div>`;
  });

  html += `</div>`;
  html += `<div class="explanation" id="explanation"></div>`;
  
  // 🚩 Dispute button
  html += `<button class="dispute-btn" onclick="openDispute('${q.id || ''}', '${(q.question || '').substring(0, 40).replace(/'/g, "\\'")}')" title="回報此題可能有誤">🚩 回報錯誤</button>`;

  document.getElementById('questionCard').innerHTML = html;

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('submitBtn').textContent = '✅ 確認答案';
  document.getElementById('nextBtn').textContent = currentIndex < quizQuestions.length - 1 ? '下一題 →' : '看結果 📊';
}

function selectOption(idx) {
  if (answered) return;
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
  userAnswers[currentIndex] = idx;
  document.getElementById('submitBtn').style.display = 'inline-block';
}

function submitAnswer() {
  if (answered || userAnswers[currentIndex] === null) return;
  answered = true;

  const q = quizQuestions[currentIndex];
  const userIdx = userAnswers[currentIndex];
  const userLabel = q.options[userIdx].label;
  const correctLabel = q.answer;

  const isCorrect = userLabel === correctLabel;
  if (isCorrect) score++;
  else {
    // Track wrong knowledge points
    const kp = q.knowledge_point || '未知';
    wrongKnowledgePoints[kp] = (wrongKnowledgePoints[kp] || 0) + 1;
    
    // Check for weakness hint
    if (wrongKnowledgePoints[kp] >= 2) {
      document.getElementById('weaknessText').textContent = 
        `「${kp}」已連續答錯 ${wrongKnowledgePoints[kp]} 次，建議回頭複習此觀念！`;
      document.getElementById('weaknessHint').classList.add('show');
    }
  }

  // Highlight
  document.querySelectorAll('.option').forEach(o => {
    o.classList.add('disabled');
    o.style.pointerEvents = 'none';
    const label = q.options[parseInt(o.dataset.idx)].label;
    if (label === correctLabel) o.classList.add('correct');
    if (label === userLabel && !isCorrect) o.classList.add('wrong');
  });

  // Show explanation
  const expl = document.getElementById('explanation');
  if (q.explanation && q.explanation.length > 10) {
    // Detailed explanation format - convert \n to <br>
    expl.innerHTML = q.explanation.replace(/\n/g, '<br>');
    expl.style.borderLeftColor = isCorrect ? '#2e7d32' : '#c62828';
  } else {
    // Simple fallback
    if (isCorrect) {
      expl.innerHTML = `<span class="exp-correct">✅ 正確！答案為 ${correctLabel}</span>`;
      expl.style.borderLeftColor = '#2e7d32';
    } else {
      expl.innerHTML = `<span class="exp-wrong">❌ 錯誤。正確答案為 ${correctLabel}</span>`;
      expl.style.borderLeftColor = '#c62828';
    }
    if (q.knowledge_point) {
      expl.innerHTML += `<br><span class="exp-kp">📌 ${q.knowledge_point}</span>`;
    }
  }
  expl.classList.add('show');

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'inline-block';
  document.getElementById('scoreDisplay').textContent = `✅ ${score} 題`;
}

function nextQuestion() {
  currentIndex++;
  const pct = (currentIndex / quizQuestions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('weaknessHint').classList.remove('show');
  renderQuestion();
}

function endQuiz() {
  showResults();
}

function showResults() {
  document.getElementById('quizArea').classList.remove('show');
  const results = document.getElementById('results');
  results.classList.add('show');

  const pct = quizQuestions.length > 0 ? Math.round(score / quizQuestions.length * 100) : 0;
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '👍' : pct >= 50 ? '📚' : '💪';
  document.getElementById('finalScore').textContent = `${emoji} ${pct} 分`;
  document.getElementById('finalStats').textContent =
    `答對 ${score} / ${quizQuestions.length} 題`;

  // Review list
  let reviewHtml = '';
  quizQuestions.forEach((q, i) => {
    const userIdx = userAnswers[i];
    const userLabel = userIdx !== null ? q.options[userIdx]?.label : '未作答';
    const correctLabel = q.answer;
    const isCorrect = userLabel === correctLabel;
    reviewHtml += `
      <div class="review-item ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '✅' : '❌'} <strong>#${q.number || i+1}</strong>
        ${q.question.substring(0, 80)}...
        <br>你的答案：${userLabel} | 正確：${correctLabel}
        <small>(${q.subject} · ${q.grade || ''}${q.knowledge_point ? ' · ' + q.knowledge_point : ''})</small>
      </div>`;
  });
  document.getElementById('reviewList').innerHTML = reviewHtml;

  // Save to localStorage
  try {
    const history = JSON.parse(localStorage.getItem('exam_history') || '[]');
    history.push({
      date: new Date().toISOString(),
      subject: selectedSubject || '全部',
      score, total: quizQuestions.length, pct
    });
    if (history.length > 50) history.shift();
    localStorage.setItem('exam_history', JSON.stringify(history));
    renderHistory();
  } catch(e) {}
  
  document.getElementById('historySection').style.display = 'block';
}

function resetQuiz() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('subjects').style.display = '';
  document.querySelector('.filters').style.display = '';
  document.getElementById('quizArea').classList.remove('show');
  document.getElementById('weaknessHint').classList.remove('show');
  wrongKnowledgePoints = {};
  currentIndex = 0;
  score = 0;
  quizQuestions = [];
  renderHistory();
}

// ── History ──
function renderHistory() {
  try {
    const history = JSON.parse(localStorage.getItem('exam_history') || '[]');
    const recent = history.slice(-5).reverse();
    
    if (recent.length === 0) {
      document.getElementById('historySection').style.display = 'none';
      return;
    }
    
    document.getElementById('historySection').style.display = 'block';
    const html = recent.map(h => {
      const date = new Date(h.date);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
      const cls = h.pct >= 80 ? 'good' : h.pct >= 50 ? 'ok' : 'bad';
      return `<div class="history-item">
        <span>${dateStr} · ${h.subject} · ${h.score}/${h.total} 題</span>
        <span class="hi-score ${cls}">${h.pct}分</span>
      </div>`;
    }).join('');
    document.getElementById('historyList').innerHTML = html;
  } catch(e) {
    document.getElementById('historySection').style.display = 'none';
  }
}

// ── 🚩 Dispute Mechanism ──
function openDispute(qId, qPreview) {
  disputeQuestionId = qId;
  document.getElementById('disputeQuestionPreview').textContent = 
    `題目：${qPreview}...`;
  document.getElementById('disputeModal').classList.add('show');
  document.getElementById('disputeAnswer').value = 'A';
  document.getElementById('disputeReason').value = '';
}

function closeDispute() {
  document.getElementById('disputeModal').classList.remove('show');
  disputeQuestionId = null;
}

function submitDispute() {
  const answer = document.getElementById('disputeAnswer').value;
  const reason = document.getElementById('disputeReason').value.trim();
  
  const dispute = {
    questionId: disputeQuestionId,
    claimedAnswer: answer,
    reason: reason,
    timestamp: new Date().toISOString(),
    subject: selectedSubject || '未知',
    questionPreview: document.getElementById('disputeQuestionPreview').textContent
  };
  
  // Save to localStorage
  try {
    const disputes = JSON.parse(localStorage.getItem('exam_disputes') || '[]');
    disputes.push(dispute);
    localStorage.setItem('exam_disputes', JSON.stringify(disputes));
    
    // Also save to disputes.json via a data URL (static site can't write files,
    // but we can offer download)
    console.log('Dispute saved:', dispute);
  } catch(e) {
    console.error('Failed to save dispute:', e);
  }
  
  closeDispute();
  alert('✅ 感謝回報！我們會盡快查證。');
}

// Close modal on overlay click
document.addEventListener('click', function(e) {
  if (e.target.id === 'disputeModal') closeDispute();
});
</script>
